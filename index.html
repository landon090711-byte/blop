<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>blop bmber</title>
<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-bottom: 20px;
  }
  .bar {
    display: flex;
    gap: 8px;
    width: 90%;
    max-width: 900px;
    margin-bottom: 20px;
  }
  #urlInput {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #222;
    color: #eee;
  }
  #goBtn {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 4px;
    border: none;
    background: #4a90e2;
    color: white;
    cursor: pointer;
  }
  #goBtn:hover {
    background: #357abd;
  }
  #viewer {
    width: 90%;
    max-width: 1200px;
    height: 80vh;
    border: 2px solid #444;
    border-radius: 6px;
    background: #fff;
  }
</style>
</head>
<body>

<h1>blop bmber</h1>

<div class="bar">
  <input type="text" id="urlInput" placeholder="Enter a website URL, e.g. https://example.com">
  <button id="goBtn">Go</button>
</div>

<iframe id="viewer" src=""></iframe>

<script>
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('goBtn');
  const frame = document.getElementById('viewer');

  function loadSite() {
    let url = input.value.trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
    }
    frame.src = url;
  }

  btn.addEventListener('click', loadSite);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadSite();
  });
</script>

</body>
</html>
